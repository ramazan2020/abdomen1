services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: webapp
      POSTGRES_PASSWORD: webapp
      POSTGRES_DB: webapp
    ports: ["5433:5432"]
    volumes:
      - webapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webapp -d webapp"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://webapp:webapp@db:5432/webapp
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-only-change-me
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /workspace/webapp/storage
      PNG_CACHE_WARMUP_SLICES: "25"
      ML_DEPENDENCIES_AVAILABLE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]
    volumes:
      - webapp_storage:/workspace/webapp/storage
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://webapp:webapp@db:5432/webapp
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-only-change-me
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /workspace/webapp/storage
      PNG_CACHE_WARMUP_SLICES: "25"
      ML_DEPENDENCIES_AVAILABLE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - webapp_storage:/workspace/webapp/storage
    command: python -m app.workers.job_runner

  frontend:
    build:
      context: frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports: ["3001:3000"]

volumes:
  webapp_pgdata:
  webapp_storage:
